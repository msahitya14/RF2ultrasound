<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>RFGuide</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; overflow: hidden; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly;
      padding: env(safe-area-inset-top, 16px) 24px env(safe-area-inset-bottom, 16px);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      user-select: none;
      min-height: 100dvh;
    }
    .label {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #levelContainer {
      position: relative;
      width: min(62vw, 260px);
      height: min(62vw, 260px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ring {
      position: absolute;
      border-radius: 50%;
    }
    .crosshair-h {
      position: absolute;
      width: 88%; height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .crosshair-v {
      position: absolute;
      width: 1px; height: 88%;
      background: rgba(255,255,255,0.08);
    }
    #bubble {
      position: absolute;
      width: 19%; height: 19%;
      border-radius: 50%;
      transition: transform 0.1s ease, background 0.3s, box-shadow 0.3s;
    }
    .center-dot {
      position: absolute;
      width: 3%; height: 3%;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
    }
    #flatMsg {
      font-size: 13px;
      color: rgba(50,220,100,0.9);
      letter-spacing: 0.04em;
      height: 18px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    #flatMsg.visible { opacity: 1; }
    .angles-row {
      display: flex;
      gap: clamp(16px, 5vw, 32px);
      align-items: flex-end;
    }
    .angle-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .angle-val {
      font-size: clamp(28px, 9vw, 38px);
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .angle-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    button {
      background: rgba(255,255,255,0.12);
      border: none;
      color: #fff;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
      -webkit-tap-highlight-color: transparent;
    }
    #statusRow {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    #statusDot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>

  <div class="label">Level</div>

  <div id="levelContainer">
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
    <div id="bubble"></div>
    <div class="center-dot"></div>
  </div>

  <div id="flatMsg">Flat — hold still</div>

  <div class="angles-row">
    <div class="angle-box">
      <div class="angle-val" id="tiltVal">—</div>
      <div class="angle-sub">Tilt</div>
    </div>
    <div class="angle-box">
      <div class="angle-val" id="rollVal">—</div>
      <div class="angle-sub">Roll</div>
    </div>
  </div>

  <button id="actionBtn">Enable Sensors</button>

  <div id="statusRow">
    <div id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>

  <script>
    // ── Rings ──────────────────────────────────────────────────────────────────
    const container = document.getElementById('levelContainer');
    [['100%','rgba(255,255,255,0.14)','solid'],
     ['71%', 'rgba(255,255,255,0.2)', 'solid'],
     ['40%', 'rgba(255,255,255,0.1)', 'dashed']].forEach(([sz, col, sty]) => {
      const el = document.createElement('div');
      el.className = 'ring';
      el.style.cssText = `width:${sz};height:${sz};border:1.5px ${sty} ${col};`;
      container.insertBefore(el, container.firstChild);
    });

    // ── State ──────────────────────────────────────────────────────────────────
    let beta = 0, gamma = 0, calBeta = 0, calGamma = 0;
    let calibrated = false, sensorsEnabled = false;

    const bubble    = document.getElementById('bubble');
    const flatMsg   = document.getElementById('flatMsg');
    const tiltVal   = document.getElementById('tiltVal');
    const rollVal   = document.getElementById('rollVal');
    const actionBtn = document.getElementById('actionBtn');
    const statusDot = document.getElementById('statusDot');
    const statusTxt = document.getElementById('statusText');

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function updateBubble() {
      const r  = (container.offsetWidth / 2) * 0.38;
      const bl = calibrated ? beta  - calBeta  : beta;
      const xl = calibrated ? gamma - calGamma : gamma;
      const bx = clamp(xl / 45 * r * 2.5, -r, r);
      const by = clamp(bl / 45 * r * 2.5, -r, r);
      const flat = Math.abs(bl) < 1.5 && Math.abs(xl) < 1.5;

      bubble.style.transform  = `translate(${bx}px,${by}px)`;
      bubble.style.background = flat ? 'rgba(50,220,100,0.92)' : 'rgba(255,214,0,0.92)';
      bubble.style.boxShadow  = flat
        ? '0 0 0 4px rgba(50,220,100,0.2)'
        : '0 0 0 4px rgba(255,214,0,0.18)';
      flatMsg.classList.toggle('visible', flat);
      tiltVal.textContent = (bl >= 0 ? '+' : '') + bl.toFixed(1) + '°';
      rollVal.textContent = (xl >= 0 ? '+' : '') + xl.toFixed(1) + '°';
    }

    // ── Device orientation ─────────────────────────────────────────────────────
    function onOrientation(e) {
      if (e.beta == null || e.gamma == null) return;
      beta  = e.beta;
      gamma = e.gamma;
      updateBubble();
      if (calibrated && ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'angles', x: beta - calBeta, y: gamma - calGamma }));
      }
    }

    function calibrate() {
      calBeta  = beta;
      calGamma = gamma;
      calibrated = true;
      actionBtn.textContent = 'Recalibrate';
      ws?.readyState === WebSocket.OPEN && ws.send(JSON.stringify({ type: 'calibrate' }));
    }

    async function enableSensors() {
      try {
        if (typeof DeviceOrientationEvent?.requestPermission === 'function' &&
            await DeviceOrientationEvent.requestPermission() !== 'granted') {
          alert('Orientation access denied. Reload and tap Allow.'); return;
        }
        sensorsEnabled = true;
        window.addEventListener('deviceorientation', onOrientation, true);
        actionBtn.textContent = 'Calibrate';
        actionBtn.onclick = calibrate;
      } catch (e) { alert(String(e)); }
    }

    actionBtn.onclick = enableSensors;

    // ── WebSocket ──────────────────────────────────────────────────────────────
    let ws = null;

    function setStatus(s) {
      const dot  = { connected: 'rgba(50,220,100,0.9)', error: '#ff453a' };
      const text = { connected: 'Connected', connecting: 'Connecting…', error: 'Connection error' };
      statusDot.style.background = dot[s]  ?? 'rgba(255,255,255,0.25)';
      statusTxt.textContent       = text[s] ?? 'Disconnected';
    }

    function connect() {
      setStatus('connecting');
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onopen  = () => setStatus('connected');
      ws.onerror = () => setStatus('error');
      ws.onclose = () => { setStatus('disconnected'); setTimeout(connect, 2000); };
    }

    connect();
  </script>
</body>
</html>
